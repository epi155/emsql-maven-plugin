packageName: com.example.emsql
className: DaoNumber
declare:
  idNumber: long
  number01: Number?
  number02: Number?
  number03: Number?
  number04: Number?
  number11: Number
  number12: Number
  number13: Number
  number14: Number
methods:
  - methodName: insert01
    perform: !Insert
      execSql: |
        insert into tnumber (
          number01,
          number11
        ) values (
          :number01,
          :number11 
        )
  - methodName: insert02
    perform: !Insert
      timeout: 5
      execSql: |
        insert into tnumber (
          number01,
          number02,
          number11,
          number12
        ) values (
          :number01,
          :number02,
          :number11,
          :number12 
        )
  
  - methodName: insert02K
    perform: !InlineProcedure
      execSql: |
        begin
        insert into tnumber (
          number01,
          number02,
          number11,
          number12
        ) values (
          :number01,
          :number02,
          :number11,
          :number12 
        ) 
        returning number13 into :number13;
        end;

  - methodName: insert12K
    perform: !InlineProcedure
      execSql: |
        begin
        insert into tnumber (
          number01,
          number02,
          number11,
          number12
        ) values (
          :number01,
          :number02,
          :number11,
          :number12 
        ) 
        returning number03 into :number03;
        end;

  - methodName: insert02K2
    perform: !InlineProcedure
      timeout: 5
      execSql: |
        begin
        insert into tnumber (
          number01,
          number02,
          number11,
          number12
        ) values (
          :number01,
          :number02,
          :number11,
          :number12 
        ) 
        returning number13, number14 
        into :number13, :number14;
        end;

  - methodName: insert12K2
    perform: !InlineProcedure
      execSql: |
        begin
        insert into tnumber (
          number01,
          number02,
          number11,
          number12
        ) values (
          :number01,
          :number02,
          :number11,
          :number12 
        ) 
        returning number03, number04 
        into :number03, :number04;
        end;

  - methodName: findNumberAny
    perform: !SelectOptional
      execSql: |
        select
          number01,
          number11
        into
          :number01,
          :number11 
        from tnumber
        where id_Number = :idNumber

  
  - methodName: findNumberAny01
    perform: !SelectOptional
      execSql: |
        select
          number01
        into
          :number01
        from tnumber
        where number02 = :number02

  - methodName: findNumberAny11
    perform: !SelectOptional
      execSql: |
        select
          number11
        into
          :number11
        from tnumber
        where number12 = :number12

  
  - methodName: call01
    perform: !CallProcedure
      outFields:
        - number02
        - number12
      execSql: |
        call solve(:number01, :number11, :number02, :number12)

  