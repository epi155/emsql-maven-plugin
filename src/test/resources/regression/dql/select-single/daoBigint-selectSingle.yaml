packageName: com.example.emsql
className: DaoBigintSelectSingle
declare:
  id: int
  bigintNull: Bigint?
  bigintNotNull: Bigint
methods:
  - methodName: findById
    perform: !SelectSingle
      execSql: |
        select bigint_null, bigint_not_null
        into :bigintNull, :bigintNotNull
        from t_bigint
        where id = :id
