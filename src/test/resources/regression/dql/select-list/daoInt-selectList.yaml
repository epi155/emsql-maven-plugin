packageName: com.example.emsql
className: DaoIntSelectList
declare:
  id: int
  intNull: Int?
  intNotNull: Int
methods:
  - methodName: findAll
    perform: !SelectList
      execSql: |
        select int_null, int_not_null
        into :intNull, :intNotNull
        from t_int
        where id > :id
