packageName: com.example.emsql
className: DaoVarcharSelectOptional
declare:
  id: int
  vcNull: VarChar?
  vcNotNull: VarChar
methods:
  - methodName: findById
    perform: !SelectOptional
      execSql: |
        select vc_null, vc_not_null
        into :vcNull, :vcNotNull
        from t_varchar
        where id = :id
