packageName: com.example.emsql
className: DaoIntSelectOptional
declare:
  id: int
  intNull: Int?
  intNotNull: Int
methods:
  - methodName: findById
    perform: !SelectOptional
      execSql: |
        select int_null, int_not_null
        into :intNull, :intNotNull
        from t_int
        where id = :id
