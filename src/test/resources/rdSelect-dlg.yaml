packageName: com.example.emsql
className: RdSelectDlg
declare:
  idCertificate: long
  commonName: varchar
  locality: varchar
  organization: varchar
  organizationUnit: varchar
  organizationsUnit: ( organizationUnit )
  organizations: ( organization, organizationUnit )
  state: char
  tsMin: timestamp
  tsMax: timestamp
methods:

  - methodName: select06
    perform: !CursorForSelect
      mode: FP
      input:
        reflect: yes
      output:
        delegate: yes
      execSql: |
        select
          common_name,
          organization
        into
          :commonName,
          :organization
        from certificate
        where locality = :locality
        and organization_unit = :organizationUnit
        and not_before >= :tsMin
        and not_after <= :tsMax


  - methodName: select13
    perform: !CursorForSelect
      input:
        reflect: yes
      output:
        delegate: yes
      execSql: |
        select
          common_name,
          organization
        into
          :commonName,
          :organization
        from certificate
        where locality = :locality
        and organization_unit in ( :organizationsUnit )
        and not_before >= :tsMin
        and not_after <= :tsMax

